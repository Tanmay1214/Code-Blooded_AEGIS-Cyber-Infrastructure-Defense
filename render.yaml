services:
  - type: web
    name: aegis-api
    env: docker
    plan: free
    region: oregon
    dockerContext: aegis_backend
    dockerfilePath: aegis_backend/Dockerfile
    healthCheckPath: /api/health-check
    envVars:
      - key: DATABASE_URL
        value: "REPLACE_WITH_EXTERNAL_URL_IN_DASHBOARD" # Manual override for DNS stability
      - key: REDIS_URL
        sync: false # Set this value manually from Upstash
      - key: APP_NAME
        value: "AEGIS Defense System [RENDER]"

  - type: worker
    name: aegis-heartbeat
    env: python
    region: oregon
    plan: starter # Background workers usually require a paid plan
    buildCommand: "pip install -r aegis_backend/requirements.txt"
    startCommand: "cd aegis_backend && python scripts/heartbeat.py"
    envVars:
      - key: API_BASE
        value: "https://aegis-api-65i8.onrender.com/api"

databases:
  - name: aegis-db
    plan: free